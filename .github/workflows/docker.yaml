name: Create and publish slim Docker image

on:
  release:
    types:
      - published
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

concurrency:
  group: docker-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-slim:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve release tag
        id: release
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          RELEASE_INPUT_TAG: ${{ inputs.release_tag }}
        run: |
          tag="${RELEASE_EVENT_TAG:-$RELEASE_INPUT_TAG}"
          if [ -z "$tag" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Prepare image name
        id: image
        run: |
          image_name="${GITHUB_REPOSITORY,,}"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "full_image_name=${REGISTRY}/$image_name" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Resolve build hash
        id: build
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.full_image_name }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}-slim
            type=raw,value=slim
          flavor: |
            latest=false

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ steps.image.outputs.full_image_name }}:cache-slim-linux-amd64-main
          cache-to: type=registry,ref=${{ steps.image.outputs.full_image_name }}:cache-slim-linux-amd64-main,mode=max
          sbom: true
          build-args: |
            BUILD_HASH=${{ steps.build.outputs.sha }}
            USE_SLIM=true
