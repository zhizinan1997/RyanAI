name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      release_created: ${{ steps.release.outputs.created || 'false' }}
      release_tag: ${{ steps.release.outputs.tag || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: pkg
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Check package version changed
        id: version_check
        run: |
          before="${{ github.event.before }}"
          current="${{ steps.pkg.outputs.version }}"

          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${before}:package.json" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          previous="$(git show "${before}:package.json" | jq -r '.version')"
          if [ "$previous" = "$current" ]; then
            echo "package.json version unchanged ($current) - skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "package.json version changed from $previous to $current"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.version_check.outputs.changed == 'true'
        run: |
          VER="${{ steps.pkg.outputs.version }}"
          awk "/^## \[${VER}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > /tmp/release-notes.md

      - name: Publish GitHub release
        id: release
        if: steps.version_check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if gh release view "$tag" &>/dev/null; then
            echo "Release $tag already exists - skipping creation"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "$tag" \
              --notes-file /tmp/release-notes.md
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive source
        if: steps.release.outputs.created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: |
            .
            !.git

  build-slim-image:
    needs: publish
    if: needs.publish.outputs.release_created == 'true'
    uses: ./.github/workflows/docker.yaml
    with:
      release_tag: ${{ needs.publish.outputs.release_tag }}
    permissions:
      contents: read
      packages: write
    secrets: inherit
